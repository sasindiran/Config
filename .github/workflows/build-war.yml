name: Build WAR

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build WAR
        run: mvn clean package -DskipTests

      - name: Upload WAR
        uses: actions/upload-artifact@v4
        with:
          name: Config-war
          path: target/Config.war
